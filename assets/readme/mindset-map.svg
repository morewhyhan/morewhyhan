<svg width="1200" height="390" viewBox="0 0 1200 390" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
     @import url("https://cdn.staticfile.org/lxgw-wenkai-screen-webfont/1.7.0/style.css");
.card {
      fill: #0d1117;
      stroke: #30363d;
      stroke-width: 1.2;
    }
    .title {
      fill: #f1f5f9;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 28px;
      font-weight: 720;
    }
    .desc {
      fill: #8b949e;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 16px;
      font-weight: 500;
    }
    .center {
      fill: #0f172a;
      stroke: #38bdf8;
      stroke-width: 1.6;
    }
    .node {
      fill: #111827;
      stroke: #30363d;
      stroke-width: 1;
    }
    .label {
      fill: #e5e7eb;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 19px;
      font-weight: 680;
    }
    .muted {
      fill: #94a3b8;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 14px;
      font-weight: 500;
    }
    .line {
      stroke: #334155;
      stroke-width: 1.3;
      opacity: 0.7;
    }
    .accent {
      fill: #38bdf8;
    }
    .soft {
      stroke: #334155;
      stroke-width: 1;
      opacity: 0.45;
    }
  </style>

  <rect class="card" x="1" y="1" width="1198" height="388" rx="10"/>
  <text class="title" x="64" y="70">Mindset</text>
  <text class="desc" x="64" y="104">用可更新的判断处理不确定性，用结果校准想法。</text>
  <line class="soft" x1="64" y1="132" x2="1136" y2="132"/>

  <g transform="translate(600,230)">
    <line class="line" x1="0" y1="0" x2="-390" y2="-70"/>
    <line class="line" x1="0" y1="0" x2="-242" y2="74"/>
    <line class="line" x1="0" y1="0" x2="0" y2="-112"/>
    <line class="line" x1="0" y1="0" x2="242" y2="74"/>
    <line class="line" x1="0" y1="0" x2="390" y2="-70"/>
    <rect class="center" x="-126" y="-52" width="252" height="104" rx="14"/>
    <text class="label" x="0" y="-10" text-anchor="middle">Bayesian updating</text>
    <text class="muted" x="0" y="18" text-anchor="middle">根据证据动态更新</text>
  </g>

  <g transform="translate(116,132)">
    <rect class="node" width="186" height="78" rx="10"/>
    <circle class="accent" cx="28" cy="39" r="6"/>
    <text class="label" x="50" y="34">求真</text>
    <text class="muted" x="50" y="56">先看事实</text>
  </g>

  <g transform="translate(270,276)">
    <rect class="node" width="186" height="78" rx="10"/>
    <circle class="accent" cx="28" cy="39" r="6"/>
    <text class="label" x="50" y="34">本质</text>
    <text class="muted" x="50" y="56">追问原因</text>
  </g>

  <g transform="translate(507,118)">
    <rect class="node" width="186" height="78" rx="10"/>
    <circle class="accent" cx="28" cy="39" r="6"/>
    <text class="label" x="50" y="34">科学</text>
    <text class="muted" x="50" y="56">假设与验证</text>
  </g>

  <g transform="translate(744,276)">
    <rect class="node" width="186" height="78" rx="10"/>
    <circle class="accent" cx="28" cy="39" r="6"/>
    <text class="label" x="50" y="34">辩证</text>
    <text class="muted" x="50" y="56">看条件和取舍</text>
  </g>

  <g transform="translate(898,132)">
    <rect class="node" width="186" height="78" rx="10"/>
    <circle class="accent" cx="28" cy="39" r="6"/>
    <text class="label" x="50" y="34">结果导向</text>
    <text class="muted" x="50" y="56">用反馈校准</text>
  </g>
</svg>
