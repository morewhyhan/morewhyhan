<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
     @import url("https://cdn.staticfile.org/lxgw-wenkai-screen-webfont/1.7.0/style.css");
.card {
      fill: #0d1117;
      stroke: #30363d;
      stroke-width: 1.2;
    }
    .title {
      fill: #e5e7eb;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 24px;
      font-weight: 700;
    }
    .text {
      fill: #cbd5e1;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 18px;
      font-weight: 500;
    }
    .muted {
      fill: #8b949e;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 15px;
      font-weight: 500;
    }
    .label {
      fill: #8b949e;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 16px;
      font-weight: 500;
    }
    .value {
      fill: #d1d5db;
      font-family: 'LXGW WenKai Screen', serif;
      font-size: 15px;
      font-weight: 600;
    }
    .axis {
      stroke: #22c55e;
      stroke-width: 3;
      opacity: 0.9;
      stroke-linecap: round;
    }
    .grid {
      stroke: #30363d;
      stroke-width: 1;
      opacity: 0.8;
    }
    .shape {
      fill: #22c55e;
      fill-opacity: 0.38;
      stroke: #22c55e;
      stroke-width: 3;
      stroke-linejoin: round;
    }
    .point {
      fill: #0d1117;
      stroke: #4ade80;
      stroke-width: 4;
    }
    .pill {
      fill: #111827;
      stroke: #30363d;
      stroke-width: 1;
    }
  </style>

  <rect class="card" x="1" y="1" width="1198" height="338" rx="8"/>

  <g transform="translate(48,44)">
    <text class="title" x="0" y="0">Activity overview</text>
    <text class="text" x="0" y="54">Contributed to morewhyhan repositories</text>
    <text class="muted" x="0" y="88">用 GitHub 活动类型展示工程参与方式：</text>
    <text class="muted" x="0" y="116">提交、PR、Issue、Code review。</text>

    <g transform="translate(0,160)">
      <rect class="pill" x="0" y="-24" width="128" height="38" rx="8"/>
      <circle cx="20" cy="-5" r="6" fill="#22c55e"/>
      <text class="muted" x="36" y="1">commits</text>

      <rect class="pill" x="148" y="-24" width="154" height="38" rx="8"/>
      <circle cx="168" cy="-5" r="6" fill="#38bdf8"/>
      <text class="muted" x="184" y="1">pull requests</text>

      <rect class="pill" x="322" y="-24" width="112" height="38" rx="8"/>
      <circle cx="342" cy="-5" r="6" fill="#f59e0b"/>
      <text class="muted" x="358" y="1">issues</text>
    </g>
  </g>

  <line class="grid" x1="560" y1="52" x2="560" y2="288"/>

  <g transform="translate(840,170)">
    <line class="grid" x1="-116" y1="0" x2="116" y2="0"/>
    <line class="grid" x1="0" y1="-116" x2="0" y2="116"/>
    <path class="grid" d="M0 -72 L72 0 L0 72 L-72 0 Z"/>
    <path class="grid" d="M0 -36 L36 0 L0 36 L-36 0 Z"/>

    <line class="axis" x1="0" y1="0" x2="0" y2="-102"/>
    <line class="axis" x1="0" y1="0" x2="92" y2="0"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="88"/>
    <line class="axis" x1="0" y1="0" x2="-116" y2="0"/>

    <path class="shape" d="M0 -22 L38 0 L0 52 L-98 0 Z"/>
    <circle class="point" cx="0" cy="-22" r="5"/>
    <circle class="point" cx="38" cy="0" r="5"/>
    <circle class="point" cx="0" cy="52" r="5"/>
    <circle class="point" cx="-98" cy="0" r="5"/>

    <text class="value" x="0" y="-124" text-anchor="middle">5%</text>
    <text class="label" x="0" y="-102" text-anchor="middle">Code review</text>

    <text class="value" x="134" y="-6" text-anchor="middle">9%</text>
    <text class="label" x="134" y="16" text-anchor="middle">Issues</text>

    <text class="value" x="0" y="116" text-anchor="middle">23%</text>
    <text class="label" x="0" y="138" text-anchor="middle">Pull requests</text>

    <text class="value" x="-146" y="-6" text-anchor="middle">63%</text>
    <text class="label" x="-146" y="16" text-anchor="middle">Commits</text>
  </g>
</svg>
